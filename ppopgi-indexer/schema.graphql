# schema.graphql  (FULL FILE)

type Registry @entity(immutable: false) {
  id: ID!                       # "registry"
  owner: Bytes
  totalLotteries: BigInt!
  latestLottery: Bytes
}

"""
✅ Global rollup for the homepage billboard (fast, scales to thousands+)
- id is always "global"
- Values are updated incrementally by event handlers (no need to load N lotteries)
- All USDC amounts are in **micro-USDC** (6 decimals) to match your Lottery fields
"""
type GlobalStats @entity(immutable: false) {
  id: ID!                       # "global"

  # Lotteries
  totalLotteriesCreated: BigInt!
  totalLotteriesSettled: BigInt!
  totalLotteriesCanceled: BigInt!

  # Tickets / revenue
  totalTicketsSold: BigInt!
  totalTicketRevenueUSDC: BigInt!     # micro-USDC

  # Prize volume (what you show as "Prizes Settled")
  totalPrizesSettledUSDC: BigInt!     # micro-USDC (sum of winningPot when settled)

  # "Active Volume" billboard metric (sum winningPot for active lotteries)
  activeVolumeUSDC: BigInt!           # micro-USDC

  # bookkeeping
  updatedAt: BigInt!
  updatedTx: Bytes!
}

type Registrar @entity(immutable: false) {
  id: ID!                       # registrar address
  authorized: Boolean!
  updatedAt: BigInt!
  updatedTx: Bytes!
}

type Deployer @entity(immutable: false) {
  id: ID!                       # deployer address (single)
  owner: Bytes

  registry: Bytes
  usdc: Bytes
  entropy: Bytes
  provider: Bytes
  callbackGasLimit: BigInt
  feeRecipient: Bytes
  protocolFeePercent: BigInt

  updatedAt: BigInt
  updatedTx: Bytes
}

type Lottery @entity(immutable: false) {
  id: ID!                       # lottery address

  # ---- Indexer bookkeeping ----
  # Used to prevent double template creation (spawn from deployer AND registry safely)
  templateSpawned: Boolean!
  indexedAt: BigInt             # optional: when we first spawned the template

  # Canonical registry metadata
  typeId: BigInt!
  creator: Bytes!               # from registry, but also equals contract creator() for your type=1
  registeredAt: BigInt!
  registryIndex: BigInt

  # Creation snapshot from Deployer event (nice for correctness + future proof)
  deployedBy: Bytes
  deployedAt: BigInt
  deployedTx: Bytes

  # Config / constants per lottery
  name: String
  usdcToken: Bytes
  feeRecipient: Bytes
  entropy: Bytes
  entropyProvider: Bytes
  callbackGasLimit: BigInt
  protocolFeePercent: BigInt

  createdAt: BigInt
  deadline: BigInt
  ticketPrice: BigInt
  winningPot: BigInt
  minTickets: BigInt
  maxTickets: BigInt
  minPurchaseAmount: BigInt

  # Live state
  status: Int                    # 0..4 (FundingPending/Open/Drawing/Completed/Canceled)
  sold: BigInt!
  ticketRevenue: BigInt!

  # Drawing state (contract vars)
  winner: Bytes
  selectedProvider: Bytes
  entropyRequestId: BigInt
  drawingRequestedAt: BigInt
  soldAtDrawing: BigInt

  # Cancel state
  canceledAt: BigInt
  soldAtCancel: BigInt
  cancelReason: String
  creatorPotRefunded: Boolean

  # Accounting snapshots
  totalReservedUSDC: BigInt
}

# ---- Per-lottery per-user rollup (derived from events) ----
type UserLottery @entity(immutable: false) {
  id: ID!                       # `${lottery}-${user}`
  lottery: Lottery!
  user: Bytes!

  ticketsPurchased: BigInt!
  usdcSpent: BigInt!

  # refunds paid out (from Claimed / TicketRefundClaimed)
  ticketRefundAmount: BigInt!
  # funds claimed (winner/creator/protocol) from Claimed / FundsClaimed
  fundsClaimedAmount: BigInt!

  updatedAt: BigInt!
  updatedTx: Bytes!
}

# ---- Typed events (full coverage) ----
type RegistryEvent @entity(immutable: true) {
  id: ID!                       # txHash-logIndex
  kind: String!
  registry: Bytes!
  txHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!

  # optional fields
  oldOwner: Bytes
  newOwner: Bytes
  registrar: Bytes
  authorized: Boolean
  lottery: Bytes
  typeId: BigInt
  creator: Bytes
  registryIndex: BigInt
}

type DeployerEvent @entity(immutable: true) {
  id: ID!
  kind: String!
  deployer: Bytes!
  txHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!

  # ownership
  oldOwner: Bytes
  newOwner: Bytes

  # config
  usdc: Bytes
  entropy: Bytes
  provider: Bytes
  callbackGasLimit: BigInt
  feeRecipient: Bytes
  protocolFeePercent: BigInt

  # lottery deployed
  lottery: Bytes
  creator: Bytes
  winningPot: BigInt
  ticketPrice: BigInt
  name: String
  entropyProvider: Bytes
  deadline: BigInt
  minTickets: BigInt
  maxTickets: BigInt

  # ✅ NEW (Option A)
  minPurchaseAmount: BigInt
}

